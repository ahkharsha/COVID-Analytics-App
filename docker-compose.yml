version: '3.8'

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_db:/var/lib/postgresql/data

  airflow-webserver:
    image: apache/airflow:2.6.3
    depends_on:
      - postgres
    user: root  # Run as root to install Java for PySpark
    environment:
      # Install PySpark, Pandas, and PyArrow into the Airflow container
      - _PIP_ADDITIONAL_REQUIREMENTS=pyspark pandas pyarrow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    # Command to install Java BEFORE starting the webserver
    command: >
      bash -c "apt-get update && apt-get install -y default-jre-headless && su airflow -c 'airflow webserver'"
    volumes:
      - ./:/opt/airflow
    ports:
      - "8080:8080"

  airflow-scheduler:
    image: apache/airflow:2.6.3
    depends_on:
      - postgres
    user: root  # Run as root to install Java for PySpark
    environment:
      - _PIP_ADDITIONAL_REQUIREMENTS=pyspark pandas pyarrow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    # Command to install Java BEFORE starting the scheduler
    command: >
      bash -c "apt-get update && apt-get install -y default-jre-headless && su airflow -c 'airflow scheduler'"
    volumes:
      - ./:/opt/airflow

  streamlit:
    build: .
    volumes:
      - ./:/app
    ports:
      - "8501:8501"

volumes:
  postgres_db: {}